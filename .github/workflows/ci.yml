name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"
      - name: Run tests
        run: python -m pytest -q tests
      - name: Smoke import check
        run: |
          python -c "
          from bankfragility.staging.bank_panel import build_panel
          from bankfragility.features.deposit_stickiness import build_stickiness_features
          from bankfragility.features.alm_mismatch import build_alm_features
          from bankfragility.features.treasury_extensions import build_treasury_extensions
          from bankfragility.features.deposit_competition import build_deposit_competition_features
          from bankfragility.models.indices import build_indices_frame
          from bankfragility.models.supervised_stickiness import train_supervised
          from bankfragility.reporting.site_exports import write_site_exports
          from bankfragility.validation.consistency import validate_panel
          print('All module imports OK')
          "
