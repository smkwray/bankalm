name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: [site/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check data freshness
        if: github.event_name == 'push'
        run: |
          STALE=$(python3 -c "import json; m=json.load(open('site/data/manifest.json')); print(m.get('freshness',{}).get('stale',False))")
          if [ "$STALE" = "True" ]; then
            echo "::warning::Site data is stale (manifest.freshness.stale=true). Data as of $(python3 -c "import json; m=json.load(open('site/data/manifest.json')); print(m.get('freshness',{}).get('site_snapshot_as_of','unknown'))")."
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
